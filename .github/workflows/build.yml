name: Build AdvancedHomes

# Se ejecuta cuando haces push o PR a main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Descargar el código del repo
      - uses: actions/checkout@v3

      # 2️⃣ Dar permisos de ejecución a gradlew
      - name: Give execute permission to gradlew
        run: chmod +x gradlew

      # 3️⃣ Instalar JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      # 4️⃣ Compilar el plugin con Gradle
      - name: Build plugin
        run: ./gradlew build

      # 5️⃣ Guardar el JAR como artifact para descargarlo
      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: AdvancedHomes-JAR
          path: build/libs/AdvancedHomes-1.0.jar
