name: Build AdvancedHomes with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repo
      - uses: actions/checkout@v3

      # 2️⃣ Instalar JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      # 3️⃣ Compilar el plugin con Maven
      - name: Build plugin
        run: mvn clean package

      # 4️⃣ Subir el JAR como artifact
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: AdvancedHomes-JAR
          path: target/AdvancedHomes-1.0.jar
