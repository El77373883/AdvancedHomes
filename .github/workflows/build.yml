name: Build AdvancedHomes

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clona tu repo
      - uses: actions/checkout@v3

      # 2️⃣ Instala JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      # 3️⃣ Genera Gradle Wrapper (¡aquí va tu bloque!)
      - name: Generate Gradle Wrapper
        run: gradle wrapper

      # 4️⃣ Da permisos para ejecutar gradlew
      - name: Make Wrapper Executable
        run: chmod +x gradlew

      # 5️⃣ Compila tu plugin
      - name: Build plugin
        run: ./gradlew build

      # 6️⃣ Sube el JAR como artifact
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: AdvancedHomes-JAR
          path: build/libs/AdvancedHomes-1.0.jar
